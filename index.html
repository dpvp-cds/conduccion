          ["Señal preventiva con silueta de una vaca indica:", "Zoológico cerca", "Posibilidad de animales en la vía", "Zona de ordeño", "Carnicería a 100m", 1],
          ["Señal azul con letras blancas 'H' significa:", "Helipuerto", "Hospital", "Hotel", "Humedal", 1],
          ["Señal rombo amarillo con un semáforo dibujado:", "Semáforo dañado", "Proximidad de un semáforo", "Cruce exclusivo", "Prohibido semáforos", 1],
          ["Señal circular, roja, con el número '80':", "Distancia a la próxima ciudad 80km", "Peso máximo 80 toneladas", "Velocidad máxima permitida 80 km/h", "Ruta número 80", 2],

          // MÁS DE COMPORTAMIENTO
          ["Conducir realizando maniobras altamente peligrosas genera:", "Multa y suspensión de la licencia", "Solo un regaño", "Permiso para piques", "No es infracción", 0],
          ["Si escucha la bocina de un tren:", "Acelere para ganar el paso", "Deténgase antes de la vía férrea y espere que pase", "Pite para que el tren frene", "El tren debe cederle el paso", 1],
          ["Al transportar carga en un vehículo particular, ésta:", "Puede sobresalir por todos lados", "No debe obstruir la visibilidad del conductor ni tapar las placas", "Debe ir amarrada a los espejos", "Solo puede llevarse de noche", 1],
          ["El uso de la bocina (pito) debe ser:", "Constante en los trancones", "Solo para prevenir un accidente", "Para saludar a los amigos", "Para apurar al de adelante", 1],
          ["En un túnel, usted debe:", "Encender luces bajas, no adelantar y no estacionar", "Apagar las luces", "Acelerar a fondo", "Tocar el pito", 0],

          // MÁS DE MECÁNICA Y SEGURIDAD
          ["El tablero marca 'check engine' (un motorcito amarillo). Significa:", "El motor explotará pronto", "Falla en el sistema de inyección o motor, requiere revisión", "Falta aceite", "Es hora de cambiar llantas", 1],
          ["¿Por qué no se debe llevar el pie apoyado en el pedal del embrague (clutch)?", "Porque cansa el pie", "Porque produce desgaste prematuro del disco y pérdida de tracción", "Porque gasta gasolina", "Porque el carro se apaga", 1],
          ["El freno de motor se logra:", "Apagando el carro", "Pisando el freno suavemente", "Bajando a un cambio o marcha menor", "Jalando el freno de mano", 2],
          ["¿A qué lado se encuentra el pedal del acelerador en un carro manual?", "A la izquierda", "En el centro", "A la derecha", "Detrás del volante", 2],
          ["En un carro automático, la letra 'P' significa:", "Poder (Power)", "Parqueo (Parking)", "Pasar (Pass)", "Peligro", 1]
        ];

        const questionBank = rawBank.map((q) => ({
          question: q[0],
          options: [q[1], q[2], q[3], q[4]],
          correct: q[5]
        }));

        function App() {
          const [examStarted, setExamStarted] = useState(false);
          const [currentQuestions, setCurrentQuestions] = useState([]);
          const [currentIndex, setCurrentIndex] = useState(0);
          const [userAnswers, setUserAnswers] = useState([]);
          const [examFinished, setExamFinished] = useState(false);
          const [chatHistory, setChatHistory] = useState([]);
          const [isWaitingAnswer, setIsWaitingAnswer] = useState(false);
          
          const chatEndRef = useRef(null);

          const scrollToBottom = () => {
            chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
          };

          useEffect(() => {
            scrollToBottom();
          }, [chatHistory, isWaitingAnswer]);

          const startExam = () => {
            const shuffled = [...questionBank].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 40);
            
            setCurrentQuestions(selected);
            setCurrentIndex(0);
            setUserAnswers([]);
            setExamFinished(false);
            setExamStarted(true);
            
            setChatHistory([
              { sender: 'bot', text: '¡Hola! Bienvenido al Simulador de Examen de Conducción Teórico (Colombia).' },
              { sender: 'bot', text: 'He seleccionado 40 preguntas aleatorias para este intento. La retroalimentación detallada te la daré al finalizar el examen. ¡Comencemos!' }
            ]);

            setTimeout(() => {
              askQuestion(selected, 0);
            }, 1000);
          };

          const askQuestion = (questionsList, index) => {
            const q = questionsList[index];
            setChatHistory(prev => [
              ...prev,
              { 
                sender: 'bot', 
                text: `Pregunta ${index + 1} de 40:\n\n${q.question}`,
                type: 'question',
                options: q.options
              }
            ]);
            setIsWaitingAnswer(true);
          };

          const handleAnswer = (optionIndex) => {
            if (!isWaitingAnswer || examFinished) return;
            
            setIsWaitingAnswer(false);
            
            const q = currentQuestions[currentIndex];
            const letter = ['A', 'B', 'C', 'D'][optionIndex];
            const selectedText = q.options[optionIndex];

            setUserAnswers(prev => [...prev, { questionIndex: currentIndex, selected: optionIndex }]);

            setChatHistory(prev => [
              ...prev,
              { sender: 'user', text: `${letter}. ${selectedText}` }
            ]);

            setTimeout(() => {
              if (currentIndex + 1 < currentQuestions.length) {
                setCurrentIndex(prev => prev + 1);
                askQuestion(currentQuestions, currentIndex + 1);
              } else {
                finishExam();
              }
            }, 600);
          };

          const finishExam = () => {
            setExamFinished(true);
            
            setUserAnswers(prevAnswers => {
                let score = 0;
                const mistakes = [];

                prevAnswers.forEach(ans => {
                    const q = currentQuestions[ans.questionIndex];
                    if (ans.selected === q.correct) {
                        score++;
                    } else {
                        mistakes.push({
                            qText: q.question,
                            userAns: q.options[ans.selected],
                            correctAns: q.options[q.correct]
                        });
                    }
                });

                setChatHistory(prev => [
                    ...prev,
                    { sender: 'bot', text: '¡Examen finalizado! Estoy procesando tus resultados...' }
                ]);

                setTimeout(() => {
                    setChatHistory(prev => [
                        ...prev,
                        { 
                            sender: 'bot', 
                            type: 'report',
                            score: score,
                            total: 40,
                            mistakes: mistakes
                        }
                    ]);
                }, 1000);

                return prevAnswers;
            });
          };

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (!isWaitingAnswer) return;
              const key = e.key.toUpperCase();
              if (key === 'A') handleAnswer(0);
              else if (key === 'B') handleAnswer(1);
              else if (key === 'C') handleAnswer(2);
              else if (key === 'D') handleAnswer(3);
            };

            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [isWaitingAnswer, currentIndex, currentQuestions]);

          return (
            <div className="flex flex-col h-screen bg-gray-50 font-sans">
              <header className="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center z-10">
                <div>
                  <h1 className="text-xl font-bold">TránsitoBot - Examen COL</h1>
                  <p className="text-xs text-blue-200">Simulador de Licencia de Conducción</p>
                </div>
                {examStarted && !examFinished && (
                  <div className="bg-blue-900 px-3 py-1 rounded-full text-sm font-semibold">
                    {currentIndex + 1} / 40
                  </div>
                )}
              </header>

              <div className="flex-1 overflow-y-auto p-4 space-y-4">
                {!examStarted ? (
                  <div className="flex flex-col items-center justify-center h-full text-center space-y-6">
                    <div className="bg-blue-100 p-6 rounded-2xl max-w-md shadow-sm">
                      <h2 className="text-2xl font-bold text-blue-900 mb-2">¿Listo para tu examen?</h2>
                      <p className="text-gray-700 mb-4">
                        Pondremos a prueba tus conocimientos sobre señales de tránsito, normas, mecánica y seguridad vial.
                      </p>
                      <ul className="text-sm text-gray-600 text-left list-disc list-inside mb-6">
                        <li>40 preguntas aleatorias por intento.</li>
                        <li>Única respuesta correcta.</li>
                        <li>Resultados al finalizar la prueba.</li>
                      </ul>
                      <button 
                        onClick={startExam}
                        className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition transform hover:scale-105"
                      >
                        Iniciar Examen
                      </button>
                    </div>
                  </div>
                ) : (
                  <div className="max-w-3xl mx-auto space-y-6">
                    {chatHistory.map((msg, idx) => (
                      <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                        {msg.sender === 'bot' && (
                          <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold mr-2 mt-1 flex-shrink-0">
                            B
                          </div>
                        )}
                        
                        <div className={`max-w-[85%] sm:max-w-[75%] rounded-2xl p-4 shadow-sm ${msg.sender === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white border border-gray-200 text-gray-800 rounded-tl-none'}`}>
                          
                          {msg.text && (
                            <p className="whitespace-pre-wrap">{msg.text}</p>
                          )}
                          
                          {msg.type === 'question' && idx === chatHistory.length - 1 && isWaitingAnswer && (
                            <div className="mt-4 flex flex-col space-y-2">
                              <p className="text-xs text-gray-400 mb-1">Presiona la tecla o haz clic:</p>
                              {msg.options.map((opt, optIdx) => (
                                <button
                                  key={optIdx}
                                  onClick={() => handleAnswer(optIdx)}
                                  className="text-left w-full p-3 bg-gray-50 hover:bg-blue-50 border border-gray-300 hover:border-blue-400 rounded-lg transition-colors flex items-center"
                                >
                                  <span className="font-bold text-blue-700 w-8 flex-shrink-0">
                                    {['A', 'B', 'C', 'D'][optIdx]}.
                                  </span>
                                  <span className="text-sm">{opt}</span>
                                </button>
                              ))}
                            </div>
                          )}

                          {msg.type === 'report' && (
                            <div className="mt-2">
                              <div className="text-center mb-6">
                                <h3 className="text-2xl font-bold mb-2">Tu Puntaje: {msg.score} / {msg.total}</h3>
                                <p className={`text-lg font-semibold ${msg.score >= 36 ? 'text-green-600' : 'text-red-600'}`}>
                                  {msg.score >= 36 ? '¡Aprobado! Excelente trabajo.' : 'Reprobado. Necesitas mínimo 36 correctas (90%). Sigue practicando.'}
                                </p>
                              </div>

                              {msg.mistakes.length > 0 && (
                                <div>
                                  <h4 className="font-bold text-gray-700 border-b pb-2 mb-4">Preguntas Incorrectas ({msg.mistakes.length})</h4>
                                  <div className="space-y-4 max-h-96 overflow-y-auto pr-2">
                                    {msg.mistakes.map((mistake, mIdx) => (
                                      <div key={mIdx} className="bg-red-50 border border-red-100 p-3 rounded-lg text-sm">
                                        <p className="font-semibold text-gray-800 mb-2">{mistake.qText}</p>
                                        <p className="text-red-700 line-through mb-1">Tu respuesta: {mistake.userAns}</p>
                                        <p className="text-green-700 font-medium">Correcta: {mistake.correctAns}</p>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              )}
                              
                              <button 
                                onClick={startExam}
                                className="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition"
                              >
                                Empezar de nuevo
                              </button>
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                    <div ref={chatEndRef} />
                  </div>
                )}
              </div>

              {examStarted && (
                <div className="bg-white p-4 border-t flex items-center shadow-lg z-10">
                  {examFinished ? (
                    <button 
                      onClick={startExam}
                      className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg transition shadow-md"
                    >
                      Empezar de nuevo
                    </button>
                  ) : (
                    <React.Fragment>
                      <input 
                        type="text" 
                        placeholder={isWaitingAnswer ? "Selecciona una opción o escribe A, B, C, D..." : "Esperando..."}
                        className="flex-1 bg-gray-100 border-transparent rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50"
                        disabled={true} 
                      />
                      <button disabled={true} className="ml-2 bg-blue-600 text-white rounded-full p-2 w-10 h-10 flex items-center justify-center opacity-50 cursor-not-allowed">
                        ➤
                      </button>
                    </React.Fragment>
                  )}
                </div>
              )}
            </div>
          );
        }

        // Renderizar la aplicación en el div con id "root"
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
